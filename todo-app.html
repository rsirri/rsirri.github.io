<!DOCTYPE html>
<html>

<head>
    <title>Todo List</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #0a0a0a;
            color: #2E75B6;
        }

        h1 {
            color: #2E75B6;
            margin-bottom: 8px;
        }

        button {
            padding: 10px 20px;
            margin: 8px 4px;
            background: #2E75B6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        button:hover {
            background: #1a5a9a;
        }

        .todo-container {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #2E75B6;
        }

        .filter-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .filter-btn {
            padding: 10px 24px;
            background-color: transparent;
            color: #aaaaaa;
            border: 1px solid #333;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            border-color: #2E75B6;
            color: #2E75B6;
        }

        .filter-btn.active {
            background-color: #2E75B6;
            border-color: #2E75B6;
            color: #ffffff;
        }

        .todo-card {
            background: #111;
            /* dark surface */
            border: 1px solid #333;
            /* subtle border */
            border-radius: 10px;
            /* rounded corners */
            padding: 32px;
            /* breathing room inside */
            max-width: 500px;
            /* not too wide */
            margin: 40px auto;
            /* centered on page */
        }

        .done span {
            text-decoration: line-through;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <h1>Todo's List App</h1>

    <!-- A block for Input todo name and button to add -->
    <div class="todo-container" id="todo-container">
        <input id="todo-input" placeholder="enter your todo here..." />
        <button id="todo-btn" onclick="addTodo()">Add</button>
    </div>

    <!-- A todo list container to display all todo lists -->
    <div class="todo-card">

        <!-- Filter Buttons -->
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterTodos('all', this)">All</button>
            <button class="filter-btn" onclick="filterTodos('active', this)">Active</button>
            <button class="filter-btn" onclick="filterTodos('completed', this)">Completed</button>
        </div>

        <!-- Todo Items -->
        <div id="todo-list"></div>

        <!-- Counter -->
        <div id="todo-counter"></div>

    </div>

    <script>

        let todos = JSON.parse(localStorage.getItem('todos')) || [];
        let currentFilter = 'all';

        // =========================
        // SAVE TODO ENTRIES
        // =========================
        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // =========================
        // GET TODO FROM INPUT AND CALL SAVE FUNCTION
        // =========================
        function addTodo() {

            const input = document.querySelector('#todo-input').value.trim();

            if (!input) return; // don't add empty todos

            todos.push({ id: Date.now(), text: input, completed: false });

            saveTodos();
            document.querySelector('#todo-input').value = '';
            renderTodos();

        }

        // ==========================
        // SHOW TODO LIST
        // ==========================
        function renderTodos() {
            const container = document.querySelector('#todo-list');
            container.innerHTML = '';

            // Step 1 - filter based on currentFilter
            const filtered = todos.filter(todo => {
                if (currentFilter === 'active') return !todo.completed;
                if (currentFilter === 'completed') return todo.completed;
                return true; // 'all' - show everything
            });

            // Step 2 - build HTML for each todo
            filtered.forEach(todo => {

                const date = new Date(todo.id);
                const formattedDate = date.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

                container.innerHTML += `
                    <div class="todo-item ${todo.completed ? 'done' : ''}">
                        <input type="checkbox" ${todo.completed ? 'checked' : ''}
                        onchange="toggleTodo(${todo.id})"/>
                         <span>${formattedDate}</span>
                        <span>${todo.text}</span>
                        <button onclick="deleteTodo(${todo.id})">Delete</button>
                    </div>
                `;
            });

            // Step 3 - update counter
            const remaining = todos.filter(t => !t.completed).length;
            document.querySelector('#todo-counter').textContent = ` ${remaining} items(s) remaining`;

        }

        // ==========================
        // FILTER SET COMPLETED TOGGLE
        // ==========================
        function toggleTodo(id) {

            const matchingData = todos.find(todo => todo.id === id);
            matchingData.completed = !matchingData.completed;

            saveTodos();
            renderTodos();

        }

        // ==========================
        // DELETE TODO
        // ==========================
        function deleteTodo(id) {

            todos = todos.filter(todo => todo.id !== id);

            saveTodos();
            renderTodos();

        }

        // =========================
        // FILTER BUTTON
        // =========================
        function filterTodos(category, clickedBtn) {

            currentFilter = category;
            const allButtons = document.querySelectorAll('.filter-btn');

            allButtons.forEach(btn => {
                btn.classList.remove('active');
            });

            clickedBtn.classList.add('active');

            renderTodos();

        }

        // ── Allow Enter key to search
        document.querySelector('#todo-input')
            .addEventListener('keyup', (e) => {
                if (e.key === 'Enter') addTodo();
            });

        // ==========================
        // DISPLAY DATA
        // ==========================
        renderTodos();

    </script>

</body>

</html>
