<!DOCTYPE html>
<html>

<head>
    <title>SAP S/4HANA Dashboard</title>

    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #0a0a0a;
            color: #2E75B6;
            margin: 0;
        }

        h1 {
            color: #2E75B6;
            margin-bottom: 8px;
        }

        h2 {
            font-family: Georgia, 'Times New Roman', Times, serif;
            color: #2E75B6;
            margin-bottom: 8px;
        }

        .page-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .dashboard-header {
            padding: 0 0 24px 0;
        }

        /* card base style */
        .kpi-card {
            font-family: 'Courier New', Courier, monospace;
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .kpi-card.selected {
            background: #161b22;
            box-shadow: 0 0 0 1px rgba(106, 169, 255, 0.35), 0 8px 18px rgba(0, 0, 0, 0.45);
        }

        .kpi-section {
            margin-bottom: 48px;
        }

        .kpi-section h2 {
            border-bottom: 1px solid #1f2a36;
            padding-bottom: 8px;
            margin-bottom: 18px;
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            transition: all 0.2s ease;
        }

        .kpi-meta {
            font-size: 0.75rem;
            color: #777;
        }


        /* status colors — use border-left for a professional look */
        .status-normal {
            border-left: 4px solid #28a745;
        }

        .status-warning {
            border-left: 4px solid #d29922;
        }

        .status-critical {
            border-left: 4px solid #f85149;
        }

        /* grid layout — try this */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .kpi-title {
            font-size: 0.9rem;
            color: #aaaaaa;
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 1.8rem;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .kpi-table {
            font-size: 0.7rem;
            color: #555;
        }

        /* Table container */
        #operational-table,
        #financial-table,
        #logistics-table,
        #risk-table {
            margin-top: 16px;
            margin-bottom: 32px;
        }

        /* Table itself */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        /* Wrap table in scrollable container */
        .table-container {
            max-height: 300px;
            /* fixed height */
            overflow-y: auto;
            /* scroll when content exceeds height */
            border: 1px solid #333;
            border-radius: 6px;
            background: #0d1117;
        }

        /* Keep header fixed while scrolling */
        thead th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: #1a1a2e;
            /* must set background or rows show through */
        }

        /* Header row */
        thead tr {
            background: #1a1a2e;
            color: #2E75B6;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 2px solid #2E75B6;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            color: #6aa9ff;
        }

        /* Data rows */
        td {
            padding: 10px 16px;
            border-bottom: 1px solid #222;
            color: #e0e0e0;
        }

        /* Alternating row colors */
        tbody tr:nth-child(even) {
            background: #111;
        }

        tbody tr:nth-child(odd) {
            background: #0a0a0a;
        }

        /* Hover effect */
        tbody tr:hover {
            background: #1a1a2e;
            cursor: pointer;
        }

        /* Table title */
        #operational-table h3,
        #financial-table h3,
        #logistics-table h3,
        #risk-table h3 {
            color: #2E75B6;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
    </style>

</head>

        // ============================
        // SHOW TABLE
        // ============================
        function showRecords(category, index) {

            const kpi = kpiData[category][index];
            const records = kpi.records || [];
            const columns = kpi.columns || [];
            const gridTable = document.querySelector(`#${category}-table`);

            if (records.length === 0) {
                gridTable.innerHTML = `<p style="color:#555;">No records available for ${kpi.title}</p>`;
                return;
            }

            // Build headers from columns
            const headers = columns.map(col => `<th>${col.label}</th>`).join('');

            // Build rows from records using column keys
            /*
            const rows = records.map(record => {
                cells = columns
                    .map(col => `<td>${record[col.key] ?? '-'}</td>`)
                    .join('');
                return `<tr>${cells}</tr>`;
            }).join('');
            */
            const rows = records.map(record => {
                const cells = columns
                    .map(col => `<td>${formatCellValue(col.key, record[col.key])}</td>`)
                    .join('');
                return `<tr>${cells}</tr>`;
            }).join('');

            gridTable.innerHTML = `

                <div class="table-container">
                    <table>
                        <thead><tr>${headers}</tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;

        }

        // ============================
        // FORMAT CELL VALUE
        // ============================
        function formatCellValue(key, value) {
            if (value === null || value === undefined || value === '') {
                return '-';
            }

            const amountFields = ['netValue', 'amount', 'amountDue', 'blockedAmount', 'totalValue'];

            if (amountFields.includes(key) && typeof value === 'number') {
                return `$${value.toLocaleString('en-US')}`;
            }

            return value;
        }
