<!DOCTYPE html>
<html>
    <head>
        <title>DOM Practice</title>
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                padding: 40px;
                background: #0a0a0a;
                color: #e0e0e0;
            }
            .box {
                width: 200px;
                height: 200px;
                background-color: #2E75B6;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.2rem;
                border-radius: 8px;
                margin: 20px 0;
                transition: all 0.3s;
            }
            .highlight {
                background-color: #E74C3C;
                transform: scale(1.1);
            }
            button {
                padding: 10px 20px;
                margin: 8px;
                background: #2E75B6;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-size: 1rem;
            }
            button:hover { background: #1a5a9a; }
            #output {
                margin-top: 20px;
                padding: 16px;
                background: #111;
                border-radius: 8px;
                min-height: 50px;
            }
        </style>
    </head>
    <body>

    <h1 id="title">DOM Practice</h1>
    <div class="box" id="myBox">I am a box</div>

    <button onclick="changeText('I am SAP Developer', '#E23C9A')">Change Text</button>
    <button onclick="changeColor()">Change Color</button>
    <button onclick="toggleHighlight()">Toggle Highlight</button>
    <button onclick="addNewElement()">Add New Element</button>
    <button onclick="removeElement()">Remove Box</button>

    <div id="output">Output will appear here...</div>

    <script>
        // 1. FIND and READ
        const box = document.querySelector('#myBox');
        const title = document.querySelector('#title');
        const output = document.querySelector('#output');

        // 2. CHANGE text content
        function changeText(newText, newColor) {
            box.textContent = newText; //'Text Changed!';
            box.style.backgroundColor = newColor; //'#27AE60';
            output.textContent = 'We used: box.textContent = "Text Changed!"';
        }

        // 3. CHANGE styles directly
        function changeColor() {
            box.style.backgroundColor = '#27AE60';
            output.textContent = 'We used: box.style.backgroundColor = "#27AE60"';
        }

        // 4. TOGGLE a class
        function toggleHighlight() {
            box.classList.toggle('highlight');
            output.textContent = 'We used: box.classList.toggle("highlight") — adds if missing, removes if present';
        }

        // 5. CREATE and ADD new element
        function addNewElement() {
            const newBox = document.createElement('div');
            newBox.className = 'box';
            newBox.textContent = 'I am a new box!';
            newBox.style.backgroundColor = '#8E44AD';
            document.body.appendChild(newBox);
            output.textContent = 'We used: createElement → set properties → appendChild';
        }

        // 6. REMOVE an element
        function removeElement() {
            const boxToRemove = document.querySelector('#myBox');
            if (boxToRemove) {
                boxToRemove.remove();
                output.textContent = 'We used: element.remove() — box is gone from the DOM';
            } else {
                output.textContent = 'Box already removed!';
            }
        }
    </script>

    </body>
</html>
